[source]
# Choose where to read the sheet from:
# - "excel" (local .xlsx/.xlsm file)
# - "google_sheets" (Google Sheet via API; always latest, even if it’s "in Chrome")
# - "sharepoint" (Excel hosted on SharePoint/OneDrive, via Microsoft Graph)
# - "sharepoint_browser" (Excel hosted on SharePoint; download via browser using your login)
type = "sharepoint_browser"

[excel]
# Path to your Excel file (xlsx/xlsm). Example: "/Users/abdun/Downloads/mw.xlsx"
path = ""

# Optional: Excel worksheet name. Leave empty to use first sheet.
worksheet = ""

[google_sheets]
# Example Google Sheet URL:
# https://docs.google.com/spreadsheets/d/SPREADSHEET_ID/edit#gid=0
spreadsheet_id = "SPREADSHEET_ID"

# Optional: tab name (worksheet). If set, we’ll read that tab.
worksheet = ""

# Optional: A1 range. If empty, we read the full used area via the worksheet (tab).
range_a1 = ""

# Path to a Google service-account credentials JSON file.
# You must share the sheet with the service account email (like xxxx@xxxx.iam.gserviceaccount.com).
service_account_json = "/absolute/path/to/service-account.json"

[sharepoint]
# Uses Microsoft Graph to download the workbook from a SharePoint/OneDrive share link.
# Your example looks like:
# https://cisco-my.sharepoint.com/:x:/p/.../IQD... (share link)
share_url = "https://cisco-my.sharepoint.com/:x:/p/dhshah2/IQDsmabtqvtmQLwQZCwGSRRMASrgBeI3X2qKywVd_i6hYzc"

# Optional: worksheet name. Leave empty to use first sheet.
worksheet = ""

# Azure AD app credentials (client credentials flow)
tenant_id = "YOUR_TENANT_ID_GUID"
client_id = "YOUR_APP_CLIENT_ID_GUID"
client_secret = "YOUR_APP_CLIENT_SECRET"

[sharepoint_browser]
# No admin / no Azure app needed.
# One-time: run `python sheet_notifier.py --init-sharepoint-auth --config config.toml`
# This saves your login session locally (cookies) to `storage_state_path`.
share_url = "https://cisco-my.sharepoint.com/:x:/p/dhshah2/IQDsmabtqvtmQLwQZCwGSRRMAVJiUwhUufb1fuq5ZUtdKTc?e=Kh58Lq"
storage_state_path = "storage_state_path = "./sharepoint.storage.json"
# Optional: worksheet name. Leave empty to use first sheet.
worksheet = "Todays MW"

